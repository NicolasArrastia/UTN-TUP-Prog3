<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Food Store</title>
    <link rel="stylesheet" href="../../../style.css" />
  </head>

  <body class="min-h-screen bg-gradient-to-br from-orange-500 via-orange-400 to-yellow-300 flex items-center justify-center p-6">
  <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-2xl">

    <!-- Header -->
    <div class="mb-6 text-center">
      <h1 class="text-3xl font-bold text-orange-600">SuperFood</h1>
      <p class="mt-1 text-sm text-gray-500">Iniciar sesión</p>
    </div>

    <!-- Form -->
    <form id="login-form" class="space-y-4">
      <div>
        <label for="email" class="mb-1 block text-sm font-medium text-gray-700">
          Email
        </label>

        <input
        placeholder="email@ejemplo.com"
          id="email"
          type="email"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 outline-none transition focus:border-orange-500 focus:ring-2 focus:ring-orange-200"
          required
        />
      </div>

      <div>
        <label for="password" class="mb-1 block text-sm font-medium text-gray-700">
          Contraseña
        </label>

        <input
          placeholder="contraseña"
          id="password"
          type="password"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 outline-none transition focus:border-orange-500 focus:ring-2 focus:ring-orange-200"
          required
        />
      </div>

      <p id="error-message" class="hidden text-sm text-red-500"></p>

      <button
        type="submit"
        class="w-full rounded-lg bg-orange-500 py-2 font-medium text-white transition hover:bg-orange-600 active:scale-[0.98]"
      >
        Iniciar sesión
      </button>
    </form>

    <div class="mt-5 text-center text-sm">
      <span class="text-gray-600">
        ¿No tienes cuenta?
      </span>

      <button
        id="register-link"
        type="button"
        class="ml-1 cursor-pointer font-medium text-orange-600 transition hover:text-orange-700"
      >
        Crear cuenta
      </button>
    </div>

    <!-- Demo users -->
    <div class="mt-6 border-t pt-4">
      <p class="text-sm font-medium text-gray-500">Usuarios de prueba</p>

      <div class="mt-2 flex flex-col gap-2 text-sm">
        <span
          id="admin-demo"
          class="cursor-pointer rounded-lg px-2 py-1 text-gray-600 transition hover:bg-orange-50 hover:text-orange-600"
        >
          admin@food.com | admin123
        </span>

        <span
          id="customer-demo"
          class="cursor-pointer rounded-lg px-2 py-1 text-gray-600 transition hover:bg-orange-50 hover:text-orange-600"
        >
          cliente@food.com | cliente123
        </span>

        <span
          id="customer2-demo"
          class="cursor-pointer rounded-lg px-2 py-1 text-gray-600 transition hover:bg-orange-50 hover:text-orange-600"
        >
          cliente2@food.com | cliente123
        </span>
      </div>
    </div>

  </div>

  <script type="module" src="./login.ts"></script>
</body>
</html>
