<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
</head>

<body>
  <h1>Login</h1>

  <form id="form">
    <div>
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        autocomplete="off"
        placeholder="example@example.com"
      />
    </div>

    <div>
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        autocomplete="off"
        placeholder="********"
      />
    </div>

    <button type="submit">Ingresar</button>
  </form>

  <a href="../registro/registro.html">Ir a Registro</a>

  <script type="module" src="./login.ts"></script>
</body>

</html>
