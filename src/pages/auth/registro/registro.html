<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Food Store</title>
    <link rel="stylesheet" href="../../../style.css" />
  </head>

  <body
    class="min-h-screen bg-gradient-to-br from-orange-500 via-orange-400 to-yellow-300 flex items-center justify-center p-6"
  >
    <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-2xl">
      <!-- Header -->
      <div class="mb-6 text-center">
        <h1 class="text-3xl font-bold text-orange-600">SuperFood</h1>
        <p class="mt-1 text-sm text-gray-500">Crear cuenta</p>
      </div>

      <!-- Form -->
      <form id="register-form" class="space-y-4">
        <div>
          <label class="mb-1 block text-sm font-medium text-gray-700">
            Nombre
          </label>
          <input
            id="name"
            type="text"
            placeholder="Juan Pérez"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 outline-none transition focus:border-orange-500 focus:ring-2 focus:ring-orange-200"
            required
          />
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium text-gray-700">
            Apellido
          </label>

          <input
            id="lastname"
            type="text"
            placeholder="Pérez"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 outline-none transition focus:border-orange-500 focus:ring-2 focus:ring-orange-200"
            required
          />
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium text-gray-700">
            Teléfono
          </label>

          <input
            id="phone"
            type="tel"
            placeholder="2235551234"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 outline-none transition focus:border-orange-500 focus:ring-2 focus:ring-orange-200"
            required
          />
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium text-gray-700">
            Email
          </label>
          <input
            id="email"
            type="email"
            placeholder="email@ejemplo.com"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 outline-none transition focus:border-orange-500 focus:ring-2 focus:ring-orange-200"
            required
          />
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium text-gray-700">
            Contraseña
          </label>
          <input
            id="password"
            type="password"
            placeholder="contraseña"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 outline-none transition focus:border-orange-500 focus:ring-2 focus:ring-orange-200"
            required
          />
        </div>

        <p id="error-message" class="hidden text-sm text-red-500"></p>

        <button
          type="submit"
          class="w-full rounded-lg bg-orange-500 py-2 font-medium text-white transition hover:bg-orange-600 active:scale-[0.98]"
        >
          Crear cuenta
        </button>
      </form>

      <!-- Login link -->
      <a
        href="../login/login.html"
        class="mt-4 block text-center text-sm text-orange-600 transition hover:text-orange-700"
      >
        Ya tengo cuenta
      </a>
    </div>

    <script type="module" src="./registro.ts"></script>
  </body>
</html>
