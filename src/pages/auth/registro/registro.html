<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro</title>
</head>

<body>
  <main class="auth">
    <h1 class="auth__title">Registro</h1>

    <form id="form" class="auth__form">
      <div class="auth__field">
        <label for="email" class="auth__label">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="auth__input"
          autocomplete="off"
          placeholder="example@example.com"
        />
      </div>

      <div class="auth__field">
        <label for="password" class="auth__label">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="auth__input"
          autocomplete="off"
          placeholder="********"
        />
      </div>

      <button type="submit" class="auth__button">Registrarse</button>
    </form>

    <a href="../login/login.html" class="auth__link">Ir a Login</a>
  </main>

  <script type="module" src="./registro.ts"></script>
</body>
</html>
