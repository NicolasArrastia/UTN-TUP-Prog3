<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrito | Food Store</title>
  </head>

  <body class="min-h-screen bg-gray-100">

    <!-- Content -->
    <main class="mx-auto flex max-w-7xl flex-col gap-6 p-6 lg:flex-row">
      
      <!-- Items -->
      <section
        id="cartContainer"
        class="flex-1 space-y-4"
      ></section>

      <!-- Summary -->
      <aside
        class="w-full rounded-lg bg-white p-5 shadow lg:w-80"
      >
        <h2 class="mb-4 text-lg font-semibold">
          Resumen del pedido
        </h2>

        <div class="space-y-3 text-sm">
          <div class="flex justify-between">
            <span>Subtotal</span>
            <span id="subtotal">$0</span>
          </div>

          <div class="flex justify-between">
            <span>Envío</span>
            <span id="shipping">$0</span>
          </div>

          <div class="border-t pt-3">
            <div class="flex justify-between font-bold">
              <span>Total</span>
              <span id="total">$0</span>
            </div>
          </div>
        </div>

        <button
          id="clearCart"
          class="mt-6 w-full rounded-lg bg-red-500 px-4 py-2 font-medium text-white transition hover:bg-red-600"
        >
          Vaciar carrito
        </button>

        <button
          id="checkoutButton"
          class="mt-3 w-full rounded-lg bg-orange-600 px-4 py-2 font-medium text-white transition hover:bg-orange-700"
        >
          Confirmar compra
        </button>
      </aside>
    </main>

<div
  id="checkoutModal"
  class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4"
>
  <div class="w-full max-w-lg rounded-xl bg-white p-6">

    <h2 class="mb-6 text-xl font-semibold">
      Confirmar compra
    </h2>

    <form id="checkoutForm" class="space-y-4">

      <div>
        <label>Teléfono</label>

        <input
          id="phone"
          type="tel"
          value="+54 223 555-1234"
          placeholder="Ej: +54 223 123-4567"
          required
          class="w-full rounded border border-neutral-400 p-2"
        />
      </div>

      <div>
        <label>Dirección de entrega</label>

        <input
          id="address"
          type="text"
          value="Av. Colón 1234, Mar del Plata"
          placeholder="Ej: Av. Colón 1234, Mar del Plata"
          required
          class="w-full rounded border border-neutral-400 p-2"
        />
      </div>

      <div>
        <label>Método de pago</label>

        <select
          id="paymentMethod"
          required
          class="w-full rounded border border-neutral-400 p-2"
        ></select>
      </div>

      <div>
        <label>Notas adicionales</label>

        <textarea
          id="notes"
          rows="3"
          placeholder="Ej: Tocar timbre, dejar el pedido en recepción..."
          class="w-full rounded border border-neutral-400 p-2"
        >Sin observaciones.</textarea>
      </div>

      <div class="flex justify-end gap-3">

        <button
          type="button"
          id="cancelCheckout"
          class="rounded bg-gray-300 px-4 py-2"
        >
          Cancelar
        </button>

        <button
          type="submit"
          class="rounded bg-orange-600 px-4 py-2 text-white transition hover:bg-orange-700"
        >
          Confirmar compra
        </button>

      </div>

    </form>

  </div>
</div>

    <script type="module" src="./cart.ts"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
