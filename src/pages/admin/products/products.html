<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos | Administración</title>

    <link rel="stylesheet" href="/src/style.css" />
  </head>

  <body class="min-h-screen bg-gray-100">
    <main class="mx-auto flex min-h-screen max-w-7xl">
      <div id="sidebar"></div>

      <section class="flex-1 p-8">
        <div class="flex items-center justify-between">
          <h2 class="mb-8 text-3xl font-bold">Gestión de Productos</h2>

          <button
            id="newProductButton"
            class="rounded-lg bg-orange-500 px-5 py-2 font-medium text-white hover:bg-orange-600"
          >
            Nuevo producto
          </button>
        </div>

        <div class="overflow-hidden rounded-xl bg-white shadow">
          <div class="overflow-x-auto">
            <table class="min-w-full">
              <thead class="bg-gray-100">
                <tr>
                  <th class="px-5 py-4 text-left">ID</th>
                  <th class="px-5 py-4 text-left">Imagen</th>
                  <th class="px-5 py-4 text-left">Nombre</th>
                  <th class="px-5 py-4 text-left">Descripción</th>
                  <th class="px-5 py-4 text-left">Precio</th>
                  <th class="px-5 py-4 text-left">Categoría</th>
                  <th class="px-5 py-4 text-left">Stock</th>
                  <th class="px-5 py-4 text-left">Estado</th>
                  <th class="px-5 py-4 text-left">Acciones</th>
                </tr>
              </thead>

              <tbody
                id="productsTableBody"
                class="divide-y divide-gray-200"
              ></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <!-- MODAL -->
    <div
      id="productModal"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-6"
    >
      <div class="w-full max-w-xl rounded-xl bg-white p-6">
        <div class="mb-6 flex items-center justify-between">
          <h3 id="modalTitle" class="text-2xl font-bold">
            Nuevo producto
          </h3>

          <button id="closeModal" class="rounded border px-3 py-1">
            ✕
          </button>
        </div>

        <form id="productForm" class="space-y-4">
          <input
            id="name"
            class="w-full rounded border border-neutral-400 p-2"
            placeholder="Nombre"
            required
          />

          <textarea
            id="description"
            class="w-full rounded border border-neutral-400 p-2"
            placeholder="Descripción"
            required
          ></textarea>

          <input
            id="image"
            class="w-full rounded border border-neutral-400 p-2"
            placeholder="URL de la imagen"
            required
          />

          <input
            id="price"
            type="number"
            class="w-full rounded border border-neutral-400 p-2"
            placeholder="Precio"
            required
          />

          <input
            id="stock"
            type="number"
            class="w-full rounded border border-neutral-400 p-2"
            placeholder="Stock"
            required
          />

          <select
            id="category"
            class="w-full rounded border border-neutral-400 p-2"
            required
          ></select>

          <label class="flex items-center gap-2">
            <input id="available" type="checkbox" checked />
            Disponible
          </label>

          <button
            type="submit"
            class="w-full rounded-lg bg-orange-500 py-3 text-white hover:bg-orange-600"
          >
            Guardar
          </button>
        </form>
      </div>
    </div>

    <script type="module" src="./products.ts"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
