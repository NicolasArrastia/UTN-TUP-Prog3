<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Categorías | Administración</title>

    <link
      rel="stylesheet"
      href="/src/style.css"
    />
  </head>

  <body class="min-h-screen bg-gray-100">
    <main class="mx-auto flex min-h-screen max-w-7xl">
      <div id="sidebar"></div>

      <section class="flex-1 p-8">
        <div
          class="mb-8 flex items-center justify-between"
        >
          <h2 class="text-3xl font-bold">
            Gestión de Categorías
          </h2>
        </div>

        <div
          class="overflow-hidden rounded-xl bg-white shadow"
        >
          <table class="min-w-full">
            <thead class="bg-gray-100">
              <tr>
                <th class="px-5 py-4 text-left">
                  ID
                </th>

                <th class="px-5 py-4 text-left">
                  Imagen
                </th>

                <th class="px-5 py-4 text-left">
                  Nombre
                </th>

                <th class="px-5 py-4 text-left">
                  Descripción
                </th>
              </tr>
            </thead>

            <tbody
              id="categoriesTableBody"
              class="divide-y divide-gray-200"
            ></tbody>
          </table>
        </div>
      </section>
    </main>

    <script
      type="module"
      src="./categories.ts"
    ></script>

    <script
      type="module"
      src="/src/main.ts"
    ></script>
  </body>
</html>
